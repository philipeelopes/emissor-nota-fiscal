services:
  api:
    build: ./backend
    container_name: emissor-api
    ports:
      - "3333:3333"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: npm run dev

  postgres:
    image: postgres:16
    container_name: emissor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emissor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: